<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>2026.05.02 물건 체크리스트</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --panel: #ffffff;
      --ink: #17202a;
      --muted: #667085;
      --line: #d9dee7;
      --accent: #0f766e;
      --accent-soft: #e6f5f2;
      --warn: #8a5a00;
      --warn-soft: #fff5d8;
      --bad: #a33131;
      --bad-soft: #fee7e7;
      --shadow: 0 8px 20px rgba(20, 28, 38, 0.08);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.45;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(246, 247, 249, 0.94);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(10px);
    }

    .wrap {
      width: min(1180px, calc(100% - 28px));
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      gap: 14px;
      align-items: center;
      justify-content: space-between;
      padding: 14px 0;
    }

    h1 {
      margin: 0;
      font-size: 22px;
      letter-spacing: 0;
    }

    .date {
      color: var(--muted);
      font-size: 14px;
      margin-top: 2px;
    }

    .actions {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    button {
      appearance: none;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--ink);
      border-radius: 7px;
      padding: 9px 12px;
      font-size: 14px;
      cursor: pointer;
    }

    button.primary {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    main {
      padding: 18px 0 36px;
    }

    .schedule {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }

    .slot {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 13px;
      box-shadow: var(--shadow);
      min-height: 132px;
    }

    .slot strong {
      display: block;
      font-size: 19px;
      margin-bottom: 6px;
    }

    .slot h2 {
      margin: 0 0 6px;
      font-size: 17px;
      letter-spacing: 0;
    }

    .slot p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    .grid {
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr);
      gap: 14px;
      align-items: start;
    }

    nav {
      position: sticky;
      top: 80px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    nav a {
      display: block;
      color: var(--ink);
      text-decoration: none;
      border-bottom: 1px solid var(--line);
      padding: 12px;
      font-size: 14px;
    }

    nav a:last-child { border-bottom: 0; }
    nav a:hover { background: #f0f4f7; }

    .progress {
      margin-top: 6px;
      height: 7px;
      background: #edf1f5;
      border-radius: 999px;
      overflow: hidden;
    }

    .bar {
      width: 0%;
      height: 100%;
      background: var(--accent);
      transition: width 0.15s ease;
    }

    section.property {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      margin-bottom: 14px;
      overflow: hidden;
    }

    .property-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: start;
      padding: 16px;
      border-bottom: 1px solid var(--line);
      background: #fbfcfd;
    }

    .property-head h2 {
      margin: 0 0 4px;
      font-size: 20px;
      letter-spacing: 0;
    }

    .meta {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 4px 8px;
      border-radius: 999px;
      background: #eef2f6;
      color: #344054;
      font-size: 13px;
      white-space: nowrap;
    }

    .pill.warn {
      background: var(--warn-soft);
      color: var(--warn);
    }

    .pill.good {
      background: var(--accent-soft);
      color: var(--accent);
    }

    .pill.bad {
      background: var(--bad-soft);
      color: var(--bad);
    }

    .scorebox {
      min-width: 108px;
      text-align: right;
      color: var(--muted);
      font-size: 13px;
    }

    .scorebox strong {
      display: block;
      color: var(--ink);
      font-size: 28px;
      line-height: 1;
    }

    .content {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      padding: 16px;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: white;
    }

    .panel.full {
      grid-column: 1 / -1;
    }

    .panel h3 {
      margin: 0 0 10px;
      font-size: 16px;
      letter-spacing: 0;
    }

    .checklist {
      display: grid;
      gap: 8px;
    }

    label.item {
      display: grid;
      grid-template-columns: 22px minmax(0, 1fr);
      gap: 8px;
      align-items: start;
      padding: 8px;
      border: 1px solid transparent;
      border-radius: 7px;
      cursor: pointer;
    }

    label.item:hover {
      border-color: var(--line);
      background: #f8fafc;
    }

    input[type="checkbox"] {
      width: 18px;
      height: 18px;
      margin: 1px 0 0;
      accent-color: var(--accent);
    }

    input[type="checkbox"]:checked + span {
      color: var(--muted);
      text-decoration: line-through;
    }

    .note {
      width: 100%;
      min-height: 112px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 10px;
      font: inherit;
      line-height: 1.45;
    }

    .summary {
      white-space: pre-wrap;
      background: #0f172a;
      color: #e5e7eb;
      border-radius: 8px;
      padding: 12px;
      min-height: 120px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 13px;
      overflow: auto;
    }

    @media (max-width: 900px) {
      .topbar,
      .property-head,
      .grid,
      .content,
      .schedule {
        grid-template-columns: 1fr;
      }

      .topbar {
        display: grid;
      }

      nav {
        position: static;
      }

      .scorebox {
        text-align: left;
      }
    }
  </style>
</head>

        focus: [
          "4층인데 엘리베이터가 있는지 확인",
          "월 70 + 관리비 10 외 추가 비용 확인",
          "투룸이 실제 방2인지, 거실이 있는지 확인",
          "욕실 개수와 상태 확인",
          "주차 가능 방식 확인: 무료, 지정, 선착순",
          "5월 입주 가능일 정확히 확인",
          "2002년식이라 수압, 배수, 보일러, 창호 상태 집중 확인"
        ]
      }
    ];

    const storePrefix = "songpa-visit-checklist-20260502:";

    function checkboxId(propertyId, sectionTitle, item) {
      return `${propertyId}:${sectionTitle}:${item}`.replace(/\s+/g, "-");
    }

    function renderItem(propertyId, sectionTitle, item) {
      const id = checkboxId(propertyId, sectionTitle, item);
      const checked = localStorage.getItem(storePrefix + id) === "1" ? "checked" : "";
      return `
        <label class="item">
          <input type="checkbox" data-check="${id}" ${checked}>
          <span>${item}</span>
        </label>`;
    }

    function renderProperty(property) {
      const sections = [
        { title: "상권/치안 특이사항", items: property.localNotes || [] },
        { title: "이 매물에서 특히 볼 것", items: property.focus },
        ...commonSections
      ].filter((section) => section.items.length);

      const riskPills = property.risk.map((item) => `<span class="pill bad">${item}</span>`).join("");
      const metaPills = property.meta.map((item) => `<span class="pill">${item}</span>`).join("");

      return `
        <section class="property" id="${property.id}" data-property="${property.id}">
          <div class="property-head">
            <div>
              <h2>${property.title}</h2>
              <div class="date">${property.subtitle}</div>
              <div class="meta">${metaPills}${riskPills}</div>
            </div>
            <div class="scorebox">
              <strong data-percent-for="${property.id}">0%</strong>
              <span>체크 진행률</span>
              <div class="progress"><div class="bar" data-bar-for="${property.id}"></div></div>
            </div>
          </div>
          <div class="content">
            ${sections.map((section) => `
              <div class="panel">
                <h3>${section.title}</h3>
                <div class="checklist">
                  ${section.items.map((item) => renderItem(property.id, section.title, item)).join("")}
                </div>
              </div>
            `).join("")}
            <div class="panel full">
              <h3>현장 메모</h3>
              <textarea class="note" data-note="${property.id}" placeholder="냄새, 수압, 관리비 답변, 등기부 확인 필요 사항, 실제 느낌"></textarea>
            </div>
          </div>
        </section>`;
    }

    function renderNav() {
      document.getElementById("nav").innerHTML = properties.map((property) => `
        <a href="#${property.id}">
          <strong>${property.title}</strong><br>
          <span class="date">${property.subtitle}</span>
          <div class="progress"><div class="bar" data-nav-bar-for="${property.id}"></div></div>
        </a>
      `).join("");
    }

    function updateProgress() {
      for (const property of properties) {
        const box = document.querySelector(`[data-property="${property.id}"]`);
        const checks = [...box.querySelectorAll("input[type='checkbox']")];
        const done = checks.filter((check) => check.checked).length;
        const percent = checks.length ? Math.round((done / checks.length) * 100) : 0;
        document.querySelector(`[data-percent-for="${property.id}"]`).textContent = `${percent}%`;
        document.querySelector(`[data-bar-for="${property.id}"]`).style.width = `${percent}%`;
        document.querySelector(`[data-nav-bar-for="${property.id}"]`).style.width = `${percent}%`;
      }
    }

    function hydrateNotes() {
      document.querySelectorAll("[data-note]").forEach((note) => {
        const key = storePrefix + "note:" + note.dataset.note;
        note.value = localStorage.getItem(key) || "";
        note.addEventListener("input", () => localStorage.setItem(key, note.value));
      });
    }

    function buildSummary() {
      const lines = [];
      lines.push("오늘 송파 매물 방문 메모");
      lines.push("");
      for (const property of properties) {
        const note = document.querySelector(`[data-note="${property.id}"]`).value.trim();
        const checked = [...document.querySelectorAll(`[data-property="${property.id}"] input[type='checkbox']`)]
          .filter((input) => input.checked)
          .length;
        lines.push(`[${property.title}] ${property.subtitle}`);
        lines.push(`체크 완료: ${checked}개`);
        lines.push(note ? note : "메모 없음");
        lines.push("");
      }
      document.getElementById("summary-output").textContent = lines.join("\n");
    }

    document.getElementById("properties").innerHTML = properties.map(renderProperty).join("");
    renderNav();
    hydrateNotes();

    document.querySelectorAll("input[type='checkbox']").forEach((input) => {
      input.addEventListener("change", () => {
        localStorage.setItem(storePrefix + input.dataset.check, input.checked ? "1" : "0");
        updateProgress();
      });
    });

    document.getElementById("make-summary").addEventListener("click", buildSummary);

    document.getElementById("clear-checks").addEventListener("click", () => {
      if (!confirm("체크 상태를 초기화할까요? 메모는 유지됩니다.")) return;
      document.querySelectorAll("input[type='checkbox']").forEach((input) => {
        input.checked = false;
        localStorage.removeItem(storePrefix + input.dataset.check);
      });
      updateProgress();
    });

    updateProgress();
    buildSummary();
  </script>
</body>
</html>
